# docker-compose.yml 定义本地开发环境的服务编排。
#
# api 服务从当前项目构建镜像；mysql 提供任务 API 可用的关系型数据库；
# redis 提供缓存或会话等扩展能力。数据卷 mysql_data 用于持久化数据库数据。
services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: task_api
      MYSQL_USER: task_user
      MYSQL_PASSWORD: task_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

volumes:
  mysql_data:
